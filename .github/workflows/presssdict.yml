name: Basketball Predictions

permissions:
  contents: write

on:
  # Run automatically every day at 06:00 UTC and 14:00 UTC
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 14 * * *"
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # No pip installs needed — stdlib only (urllib, json, math)

      - name: Collect fixtures & team history
        run: python scripts/collect_fixtures.py

      - name: Generate predictions
        run: python scripts/generate_predictions.py

      - name: Commit & push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ public/data/
          git diff --cached --quiet || git commit -m "chore: update predictions $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
