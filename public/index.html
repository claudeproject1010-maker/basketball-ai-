<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>
Basketball AI
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#050505;

color:white;

font-family:
Arial,
sans-serif;

padding:
50px;

}

.container{

max-width:
1500px;

margin:
0 auto;

}

.header{

display:flex;

align-items:center;

gap:20px;

margin-bottom:15px;

}

.logo{

font-size:
72px;

}

h1{

font-size:
64px;

font-weight:
800;

}

.subtitle{

color:#999;

font-size:
18px;

margin-bottom:
35px;

}

.grid{

display:grid;

grid-template-columns:
repeat(
auto-fill,
minmax(
450px,
1fr
)
);

gap:
18px;

}

.card{

background:
#111;

border-radius:
18px;

padding:
28px;

transition:
0.2s;

}

.card:hover{

transform:
translateY(-2px);

}

.match{

font-size:
32px;

font-weight:
700;

margin-bottom:
20px;

}

.row{

margin:
10px 0;

font-size:
20px;

}

.high{

color:
#00ff88;

font-weight:
700;

}

.medium{

color:
orange;

font-weight:
700;

}

.low{

color:
#ff4444;

font-weight:
700;

}

.empty{

color:
#777;

font-size:
22px;

margin-top:
50px;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">
🏀
</div>

<h1>
Basketball AI
</h1>

</div>

<div class="subtitle">

Top 30 OVER predictions

</div>

<div
id="results"
class="grid">

Loading...

</div>

</div>

<script>

async function loadPredictions(){

try{

const response=
await fetch(
"./data/predictions.json"
);

const data=
await response.json();

const predictions=

Array.isArray(
data.top_predictions
)

?

data.top_predictions

:

Array.isArray(
data.predictions
)

?

data.predictions

:

[];

const root=

document.getElementById(
"results"
);

root.innerHTML="";

if(
predictions.length===0
){

root.innerHTML=

`
<div class="empty">

No predictions found

</div>
`;

return;

}

predictions.forEach(

p=>{

const card=

document.createElement(
"div"
);

card.className=
"card";

const probability=

Math.round(
Number(
p.over_probability
||
0
)
*
100
);

const edge=

p.edge
??

(
Number(
p.predicted_total
||
0
)

-

Number(
p.market_total
||
0
)

).toFixed(1);

const confidence=

(
p.confidence
||
"LOW"
)
.toUpperCase();

let cls=
"low";

if(
confidence==="HIGH"
)
cls="high";

if(
confidence==="MEDIUM"
)
cls="medium";

card.innerHTML=

`

<div class="match">

${p.game || "Unknown Match"}

</div>

<div class="row">

League:
${p.league || "-"}

</div>

<div class="row">

Expected:
${p.predicted_total ?? "-"}

</div>

<div class="row">

Market:
${p.market_total ?? "-"}

</div>

<div class="row">

Edge:
${edge}

</div>

<div class="row">

Probability:
${probability}%

</div>

<div class="row">

Confidence:

<span class="${cls}">

${confidence}

</span>

</div>

`;

root.appendChild(
card
);

}

);

}

catch(
err
){

document
.getElementById(
"results"
)

.innerHTML=

`

<div class="empty">

Could not load predictions

</div>

`;

console.error(
err
);

}

}

loadPredictions();

</script>

</body>

</html>
