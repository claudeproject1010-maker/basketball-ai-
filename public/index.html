<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Basketball AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:white;
font-family:Arial, sans-serif;
padding:50px;
}

.header{
display:flex;
align-items:center;
gap:18px;
margin-bottom:12px;
}

.logo{
font-size:64px;
}

h1{
font-size:72px;
font-weight:800;
}

.subtitle{
font-size:18px;
color:#9a9a9a;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:
repeat(
auto-fit,
minmax(360px,1fr)
);
gap:24px;
}

.card{
background:#111;
border-radius:20px;
padding:28px;
transition:.2s;
}

.card:hover{
transform:translateY(-2px);
}

.game{
font-size:24px;
font-weight:700;
margin-bottom:18px;
}

.row{
margin:10px 0;
font-size:18px;
}

.label{
opacity:.7;
}

.high{
color:#00ff88;
font-weight:700;
}

.medium{
color:#ffb000;
font-weight:700;
}

.low{
color:#ff5555;
font-weight:700;
}

.loading{
font-size:20px;
opacity:.7;
}

.error{
color:#ff5555;
font-size:20px;
}

</style>

</head>

<body>

<div class="header">
<div class="logo">🏀</div>
<h1>Basketball AI</h1>
</div>

<div class="subtitle">
Top 30 OVER predictions
</div>

<div
id="app"
class="grid"
>

<div class="loading">
Loading predictions...
</div>

</div>

<script>

async function loadPredictions(){

const app =
document.getElementById(
"app"
);

try{

const response =
await fetch(
"/data/predictions.json"
);

if(
!response.ok
){

throw new Error(
"JSON not found"
);

}

const data =
await response.json();

const predictions =
Array.isArray(
data.top_predictions
)
?
data.top_predictions
:
[];

app.innerHTML="";

if(
predictions.length===0
){

app.innerHTML=
`
<div class="error">
No predictions found
</div>
`;

return;

}

predictions.forEach(

p=>{

const probability =
Math.round(
(
p.over_probability
||
0
)
*
100
);

const confidence =
(
p.confidence
||
"LOW"
)
.toLowerCase();

const edge =
(
p.edge
??
(
p.predicted_total
-
p.market_total
)
);

const card =
document.createElement(
"div"
);

card.className=
"card";

card.innerHTML=
`

<div class="game">

${p.game}

</div>

<div class="row">

<span class="label">
League:
</span>

${p.league}

</div>

<div class="row">

<span class="label">
Expected:
</span>

${p.predicted_total}

</div>

<div class="row">

<span class="label">
Market:
</span>

${p.market_total}

</div>

<div class="row">

<span class="label">
Edge:
</span>

${edge}

</div>

<div class="row">

<span class="label">
Probability:
</span>

${probability}%

</div>

<div class="row">

<span class="label">
Confidence:
</span>

<span class="${confidence}">
${p.confidence}
</span>

</div>

`;

app.appendChild(
card
);

}

);

}

catch(error){

app.innerHTML=
`

<div class="error">

Could not load
/data/predictions.json

</div>

`;

console.error(
error
);

}

}

loadPredictions();

</script>

</body>

</html>
