<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basketball AI — Over/Under Predictions</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090a;--surface:#111214;--surface2:#1a1c1f;--border:#2a2d32;
  --text:#e8eaed;--muted:#7a7f8a;--green:#00e676;--amber:#ffab40;
  --red:#ff5252;--blue:#448aff;--accent:#ff6d00;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
.logo{font-size:32px;line-height:1}
.brand h1{font-size:20px;font-weight:700;letter-spacing:-.4px}
.brand p{font-size:11px;color:var(--muted);margin-top:2px}
.header-right{margin-left:auto;text-align:right}
#last-updated{font-size:11px;color:var(--muted)}
#game-count{font-size:12px;color:var(--blue);font-weight:600;margin-top:2px}

/* Warning banner */
#warn-banner{display:none;background:#1a1200;border:1px solid #5a3800;color:#ffab40;padding:10px 28px;font-size:13px}

/* Toolbar */
.toolbar{padding:12px 28px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface)}
.fbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 13px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .15s}
.fbtn:hover,.fbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Stats */
.stats-bar{display:flex;border-bottom:1px solid var(--border)}
.stat{flex:1;padding:14px 20px;border-right:1px solid var(--border);text-align:center}
.stat:last-child{border-right:none}
.stat-val{font-size:26px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* Grid */
main{padding:20px 28px}
#predictions{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .15s}
.card:hover{border-color:#444}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 8px;border-bottom:1px solid var(--border)}
.league-badge{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.conf-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;text-transform:uppercase}
.conf-HIGH{background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.conf-MEDIUM{background:rgba(255,171,64,.12);color:var(--amber);border:1px solid rgba(255,171,64,.3)}
.conf-LOW{background:rgba(255,82,82,.12);color:var(--red);border:1px solid rgba(255,82,82,.3)}

.card-body{padding:14px 16px}
.matchup{margin-bottom:10px}
.team-name{font-size:15px;font-weight:700;line-height:1.3}
.vs{font-size:11px;color:var(--muted);margin:2px 0}

/* Game time */
.game-time{font-size:11px;color:var(--blue);margin-bottom:10px;display:flex;align-items:center;gap:4px}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.metric{background:var(--surface2);border-radius:6px;padding:8px;text-align:center}
.metric-val{font-size:18px;font-weight:700}
.metric-lbl{font-size:9px;color:var(--muted);margin-top:1px;text-transform:uppercase;letter-spacing:.3px}

/* Prob bars */
.prob-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.prob-label{font-size:11px;color:var(--muted);width:38px;flex-shrink:0}
.bar-wrap{flex:1;background:var(--surface2);border-radius:3px;height:6px;overflow:hidden}
.bar{height:100%;border-radius:3px;transition:width .4s}
.over-bar{background:var(--green)}
.under-bar{background:var(--red)}
.prob-pct{font-size:11px;font-weight:700;width:34px;text-align:right}

/* Data quality row */
.data-row{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);padding-top:8px;border-top:1px solid var(--border);gap:8px}
.dg{color:var(--green)}.dw{color:var(--amber)}.dn{color:var(--red)}

/* No history warning on card */
.no-data-note{font-size:10px;color:var(--amber);background:rgba(255,171,64,.08);border-radius:4px;padding:5px 8px;margin-top:8px;text-align:center}

/* States */
.state-msg{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);font-size:16px}
.state-msg .e{font-size:40px;display:block;margin-bottom:12px}

/* Diagnostic panel */
#diag{display:none;margin:16px 28px;background:#0d1117;border:1px solid #2a2d32;border-radius:8px;padding:16px;font-family:monospace;font-size:12px;color:#8b949e;white-space:pre-wrap;max-height:200px;overflow-y:auto}

@media(max-width:600px){
  header{padding:12px 16px}
  .toolbar,.stats-bar{padding:10px 16px}
  main{padding:12px 16px}
  .stats-bar{display:none}
  #predictions{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="logo">🏀</div>
  <div class="brand">
    <h1>Basketball AI</h1>
    <p>Statistical Over/Under Predictions · WAT (GMT+1)</p>
  </div>
  <div class="header-right">
    <div id="last-updated">Loading…</div>
    <div id="game-count"></div>
  </div>
</header>

<div id="warn-banner"></div>

<div class="toolbar" id="toolbar">
  <button class="fbtn active" data-f="ALL">All Games</button>
  <button class="fbtn" data-f="HIGH">🔥 High Confidence</button>
  <button class="fbtn" data-f="MEDIUM">⚡ Medium</button>
  <button class="fbtn" data-f="LOW">📊 Low</button>
  <button class="fbtn" data-f="DIAG" style="margin-left:auto;color:var(--muted)">🔍 Diagnostics</button>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">Games</div></div>
  <div class="stat"><div class="stat-val" id="s-high">—</div><div class="stat-lbl">High Confidence</div></div>
  <div class="stat"><div class="stat-val" id="s-med">—</div><div class="stat-lbl">Medium</div></div>
  <div class="stat"><div class="stat-val" id="s-nohist">—</div><div class="stat-lbl">No History ⚠️</div></div>
</div>

<div id="diag"></div>

<main>
  <div id="predictions">
    <div class="state-msg"><span class="e">⏳</span>Loading predictions…</div>
  </div>
</main>

<script>
// ── WAT time helper (UTC+1) ──────────────────────────────────────────────
function toWAT(isoStr) {
  if (!isoStr) return '';
  try {
    const d = new Date(isoStr);
    if (isNaN(d)) return '';
    // WAT = UTC+1
    const wat = new Date(d.getTime() + 60*60*1000);
    const hh = String(wat.getUTCHours()).padStart(2,'0');
    const mm = String(wat.getUTCMinutes()).padStart(2,'0');
    const dd = wat.toUTCString().slice(0,16); // e.g. "Sat, 28 Jun 2026"
    return `${dd} · ${hh}:${mm} WAT`;
  } catch(e){ return ''; }
}

function watDate(isoStr) {
  if (!isoStr) return '';
  try {
    const d = new Date(isoStr);
    if (isNaN(d)) return '';
    const wat = new Date(d.getTime() + 60*60*1000);
    return wat.toUTCString().slice(0,16);
  } catch(e){ return ''; }
}

let all = [], activeF = 'ALL';

async function load() {
  const container = document.getElementById('predictions');
  try {
    const res = await fetch('/data/predictions.json?ts=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    all = data.top_predictions || [];

    // Header
    const ts = data.generated_at ? new Date(data.generated_at) : null;
    const watTs = ts ? toWAT(ts.toISOString()) : '';
    document.getElementById('last-updated').textContent = watTs ? 'Updated ' + watTs : '';
    document.getElementById('game-count').textContent =
      (data.total_games_analysed || all.length) + ' games analysed';

    // Stats
    const byConf = data.by_confidence || {};
    const noHist = data.games_with_no_history || 0;
    document.getElementById('s-total').textContent = all.length;
    document.getElementById('s-high').textContent  = byConf.HIGH  || 0;
    document.getElementById('s-med').textContent   = byConf.MEDIUM|| 0;
    document.getElementById('s-nohist').textContent= noHist;

    // Warning if all games have no history
    if (noHist > 0 && noHist === data.total_games_analysed) {
      const b = document.getElementById('warn-banner');
      b.style.display = 'block';
      b.textContent = `⚠️  No team history was collected for any game — predictions are using league baselines only. Check Diagnostics for API errors.`;
    } else if (noHist > 0) {
      const b = document.getElementById('warn-banner');
      b.style.display = 'block';
      b.textContent = `⚠️  ${noHist} game(s) are using league baselines only (no team history collected for those teams).`;
    }

    // Diagnostic panel content
    const diag = document.getElementById('diag');
    const lines = [
      `Generated: ${data.generated_at}`,
      `Total analysed: ${data.total_games_analysed}`,
      `Skipped (final): ${data.games_skipped_final || 0}`,
      `No history: ${noHist}`,
      `Confidence — HIGH:${byConf.HIGH||0}  MEDIUM:${byConf.MEDIUM||0}  LOW:${byConf.LOW||0}`,
    ];
    if (data.source_errors && data.source_errors.length) {
      lines.push('\nAPI ERRORS DURING COLLECTION:');
      data.source_errors.forEach(e => lines.push('  ! ' + e));
    }
    diag.textContent = lines.join('\n');

    // League filter buttons
    const leagues = [...new Set(all.map(p=>p.league).filter(Boolean))].sort();
    const toolbar = document.getElementById('toolbar');
    // Insert before diagnostics button
    const diagBtn = toolbar.querySelector('[data-f="DIAG"]');
    leagues.forEach(lg => {
      const btn = document.createElement('button');
      btn.className = 'fbtn';
      btn.dataset.f = 'LEAGUE:' + lg;
      btn.textContent = lg;
      toolbar.insertBefore(btn, diagBtn);
    });

    render();

    // Filter clicks
    document.querySelectorAll('.fbtn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.f === 'DIAG') {
          const d = document.getElementById('diag');
          d.style.display = d.style.display === 'block' ? 'none' : 'block';
          return;
        }
        document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeF = btn.dataset.f;
        render();
      });
    });

  } catch(err) {
    container.innerHTML = `<div class="state-msg"><span class="e">⚠️</span>Predictions not available.<br><small>Run the GitHub Action to generate them. Error: ${err.message}</small></div>`;
  }
}

function render() {
  const container = document.getElementById('predictions');
  let filtered = all;
  if (activeF === 'HIGH')         filtered = all.filter(p => p.confidence === 'HIGH');
  else if (activeF === 'MEDIUM')  filtered = all.filter(p => p.confidence === 'MEDIUM');
  else if (activeF === 'LOW')     filtered = all.filter(p => p.confidence === 'LOW');
  else if (activeF.startsWith('LEAGUE:')) {
    const lg = activeF.replace('LEAGUE:','');
    filtered = all.filter(p => p.league === lg);
  }
  if (!filtered.length) {
    container.innerHTML = `<div class="state-msg"><span class="e">🔍</span>No games match this filter.</div>`;
    return;
  }
  container.innerHTML = filtered.map(card).join('');
}

function dq(n) {
  if (n >= 8) return `<span class="dg">${n} games ✓</span>`;
  if (n >= 4) return `<span class="dw">${n} games</span>`;
  return `<span class="dn">${n || 'no'} games ⚠️</span>`;
}

function fmt(v) { return v != null ? Math.round(v) : '—'; }

function card(p) {
  const overPct  = Math.round((p.over_probability||0)*100);
  const underPct = Math.round((p.under_probability||0)*100);
  const hn = p.home_games_used || 0;
  const an = p.away_games_used || 0;
  const noData = hn === 0 && an === 0;
  const watTime = toWAT(p.time_utc);
  const edgeColor = p.edge >= 0 ? 'var(--green)' : 'var(--red)';
  const edgeSign  = p.edge >= 0 ? '+' : '';

  return `
<div class="card">
  <div class="card-header">
    <span class="league-badge">${p.league||'—'}</span>
    <span class="conf-badge conf-${p.confidence}">${p.confidence}</span>
  </div>
  <div class="card-body">
    <div class="matchup">
      <div class="team-name">${p.home_team||'—'}</div>
      <div class="vs">vs</div>
      <div class="team-name">${p.away_team||'—'}</div>
    </div>
    ${watTime ? `<div class="game-time">🕐 ${watTime}</div>` : ''}

    <div class="metrics">
      <div class="metric">
        <div class="metric-val" style="color:var(--blue)">${fmt(p.predicted_total)}</div>
        <div class="metric-lbl">Predicted</div>
      </div>
      <div class="metric">
        <div class="metric-val" style="color:var(--muted)">${fmt(p.league_baseline)}</div>
        <div class="metric-lbl">Lg Avg</div>
      </div>
      <div class="metric">
        <div class="metric-val" style="color:${edgeColor}">${edgeSign}${p.edge??'—'}</div>
        <div class="metric-lbl">Edge</div>
      </div>
    </div>

    <div class="prob-row">
      <span class="prob-label">OVER</span>
      <div class="bar-wrap"><div class="bar over-bar" style="width:${overPct}%"></div></div>
      <span class="prob-pct" style="color:var(--green)">${overPct}%</span>
    </div>
    <div class="prob-row">
      <span class="prob-label">UNDER</span>
      <div class="bar-wrap"><div class="bar under-bar" style="width:${underPct}%"></div></div>
      <span class="prob-pct" style="color:var(--red)">${underPct}%</span>
    </div>

    <div class="data-row">
      <span>🏠 ${p.home_team?.split(' ').pop()||'Home'}: ${dq(hn)}${p.home_avg_scored != null ? ', avg '+Math.round(p.home_avg_scored)+' pts' : ''}</span>
      <span>✈️ ${p.away_team?.split(' ').pop()||'Away'}: ${dq(an)}${p.away_avg_scored != null ? ', avg '+Math.round(p.away_avg_scored)+' pts' : ''}</span>
    </div>

    ${noData ? `<div class="no-data-note">⚠️ No historical data — using league baseline only</div>` : ''}
  </div>
</div>`;
}

load();
</script>
</body>
</html>
