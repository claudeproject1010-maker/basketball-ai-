<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>
Basketball AI
</title>

<style>

body{

font-family:
Arial;

max-width:
1400px;

margin:
auto;

padding:
20px;

background:
#111;

color:
white;

}

h1{

margin-bottom:
10px;

}

.card{

background:
#1c1c1c;

padding:
16px;

margin-bottom:
12px;

border-radius:
10px;

}

.high{

color:
#00ff99;

}

.medium{

color:
orange;

}

.low{

color:
red;

}

.small{

opacity:
0.7;

}

</style>

</head>

<body>

<h1>
🏀 Basketball AI
</h1>

<div
class="small">

Top 30 OVER predictions

</div>

<br>

<div
id="results">

Loading…

</div>

<script>

fetch("/data/predictions.json")

.then(r => r.json())

.then(data => {

const predictions =
data.top_predictions ||
data.predictions ||
[];

const root =
document.getElementById(
"results"
);

root.innerHTML = "";

if (!predictions.length){

root.innerHTML =
"No predictions available";

return;

}

predictions.forEach(p=>{

const div =
document.createElement(
"div"
);

let cls="low";

if(
p.confidence==="HIGH"
)
cls="high";

else if(
p.confidence==="MEDIUM"
)
cls="medium";

const expected =
Number(
p.predicted_total || 0
);

const market =
Number(
p.market_total || 0
);

const edge =
(
expected - market
).toFixed(1);

const probability =
Math.round(
(Number(
p.over_probability
)||0)
*
100
);

div.className =
"card";

div.innerHTML =

`

<h2>

${p.game || "-"}

</h2>

<div>

League:
${p.league || "-"}

</div>

<div>

Expected:
${expected}

</div>

<div>

Market:
${market}

</div>

<div>

Edge:
${edge}

</div>

<div>

Probability:

${probability}%

</div>

<div
class="${cls}">

Confidence:

${p.confidence || "LOW"}

</div>

`;

root.appendChild(
div
);

});

})

.catch(err=>{

console.log(err);

document
.getElementById(
"results"
)

.innerHTML =

"Could not load predictions";

});

</script>

</body>

</html>
