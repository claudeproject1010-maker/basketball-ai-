<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>
Basketball AI
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#050505;

color:white;

font-family:
Arial,
sans-serif;

padding:
50px;

}

.container{

max-width:
1500px;

margin:
0 auto;

}

.header{

display:flex;

align-items:center;

gap:20px;

margin-bottom:15px;

}

.logo{

font-size:
72px;

}

h1{

font-size:
64px;

font-weight:
800;

}

.subtitle{

color:#999;

font-size:
18px;

margin-bottom:
35px;

}

.grid{

display:grid;

grid-template-columns:
repeat(
auto-fill,
minmax(
450px,
1fr
)
);

gap:
18px;

}

.card{

background:
#111;

border-radius:
18px;

padding:
28px;

transition:
0.2s;

}

.card:hover{

transform:
translateY(-2px);

}

.match{

font-size:
32px;

font-weight:
700;

margin-bottom:
20px;

}

.row{

margin:
10px 0;

font-size:
20px;

}

.high{

color:
#00ff88;

font-weight:
700;

}

.medium{

color:
orange;

font-weight:
700;

}

.low{

color:
#ff4444;

font-weight:
700;

}

.empty{

color:
#777;

font-size:
22px;

margin-top:
50px;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="logo">
🏀
</div>

<h1>
Basketball AI
</h1>

</div>

<div class="subtitle">

Top 30 OVER predictions

</div>

<div
id="results"
class="grid">

Loading...

</div>

</div>

<script>

async function load(){

try{

const res=
await fetch("./data/predictions.json")

const data=
await res.json()

const predictions=

data.top_predictions
||
data.predictions
||
[]

const app=
document.getElementById("app")
||
document.getElementById("results")

app.innerHTML=""

predictions.forEach(p=>{

try{

const probability=

Math.round(
Number(
p.over_probability || 0
)*100
)

const edge=

p.edge
??

(
Number(
p.predicted_total||0
)
-
Number(
p.market_total||0
)
).toFixed(1)

const confidence=

(p.confidence||"LOW")

let cls="low"

if(confidence==="HIGH")
cls="high"

if(confidence==="MEDIUM")
cls="medium"

app.innerHTML+=`

<div class="card">

<div class="match">
${p.game||"-"}
</div>

<div class="value">
League:
${p.league||"-"}
</div>

<div class="value">
Expected:
${p.predicted_total??"-"}
</div>

<div class="value">
Market:
${p.market_total??"-"}
</div>

<div class="value">
Edge:
${edge}
</div>

<div class="value">
Probability:
${probability}%
</div>

<div class="value">

Confidence:

<span class="${cls}">
${confidence}
</span>

</div>

</div>

`

}

catch(err){

console.log(
"Skipped record",
err
)

}

})

}

catch(err){

console.error(err)

document.body.innerHTML+=
"<p>Could not load predictions</p>"

}

}

load()

</script>

</body>

</html>
