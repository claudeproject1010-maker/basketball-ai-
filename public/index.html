<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Basketball AI</title>

<style>
body{
background:#050505;
color:white;
font-family:Arial;
padding:40px;
}

h1{
font-size:60px;
margin-bottom:10px;
}

.subtitle{
color:#aaa;
margin-bottom:40px;
}

.card{
background:#111;
padding:25px;
margin-bottom:20px;
border-radius:18px;
}

.match{
font-size:36px;
font-weight:bold;
margin-bottom:20px;
}

.value{
margin:8px 0;
font-size:24px;
}

.high{
color:#00ff88;
font-weight:bold;
}

.medium{
color:#ffaa00;
font-weight:bold;
}

.low{
color:#ff4444;
font-weight:bold;
}
</style>
</head>

<body>

<h1>🏀 Basketball AI</h1>
<div class="subtitle">Top 30 OVER predictions</div>

<div id="app"></div>

<script>

async function load(){

const res=
await fetch("./data/predictions.json")

const data=
await res.json()

const predictions =
data.top_predictions || []

const app =
document.getElementById("app")

app.innerHTML=""

predictions.forEach(p=>{

const probability=
Math.round(
(p.over_probability || 0)*100
)

const edge=
(
p.predicted_total-
p.market_total
).toFixed(1)

app.innerHTML+=`

<div class="card">

<div class="match">
${p.game}
</div>

<div class="value">
League:
${p.league}
</div>

<div class="value">
Expected:
${p.predicted_total}
</div>

<div class="value">
Market:
${p.market_total}
</div>

<div class="value">
Edge:
${edge}
</div>

<div class="value">
Probability:
${probability}%
</div>

<div class="value">

Confidence:

<span class="
${p.confidence.toLowerCase()}
">

${p.confidence}

</span>

</div>

</div>

`

})

}

load()

</script>

</body>
</html>
