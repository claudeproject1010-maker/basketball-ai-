<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Basketball AI</title>

<style>

body{
background:#080808;
color:white;
font-family:Arial,sans-serif;
max-width:1400px;
margin:auto;
padding:30px;
}

h1{
margin-bottom:8px;
}

.subtitle{
opacity:.7;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:
repeat(
auto-fit,
minmax(360px,1fr)
);
gap:18px;
}

.card{
background:#171717;
padding:20px;
border-radius:14px;
}

.game{
font-size:26px;
font-weight:bold;
margin-bottom:14px;
}

.line{
margin-bottom:6px;
}

.high{
color:#00ff88;
}

.medium{
color:#ffb300;
}

.low{
color:#ff5555;
}

</style>

</head>

<body>

<h1>
🏀 Basketball AI
</h1>

<div class="subtitle">
Top 30 OVER predictions
</div>

<div
id="results"
class="grid"
>

Loading predictions…

</div>

<script>

fetch(
"./data/predictions.json"
)

.then(
r=>r.json()
)

.then(

data=>{

const predictions=

data.top_predictions

||

data.predictions

||

[];

const root=

document.getElementById(
"results"
);

root.innerHTML="";

if(
predictions.length===0
){

root.innerHTML=

"<h3>No predictions available</h3>";

return;

}

predictions.forEach(

p=>{

const card=

document.createElement(
"div"
);

card.className=
"card";

let confidenceClass=
"low";

if(
p.confidence==="HIGH"
)

confidenceClass=
"high";

if(
p.confidence==="MEDIUM"
)

confidenceClass=
"medium";

const probability=

typeof p.over_probability
==="number"

?

(p.over_probability*100)
.toFixed(0)

:

"--";

card.innerHTML=

`

<div class="game">

${p.game||"Unknown Match"}

</div>

<div class="line">

League:
${p.league||"--"}

</div>

<div class="line">

Expected:
${p.predicted_total??"--"}

</div>

<div class="line">

Market:
${p.market_total??"--"}

</div>

<div class="line">

Edge:
${p.edge??"--"}

</div>

<div class="line">

Probability:
${probability}%

</div>

<div
class="${confidenceClass}"
>

Confidence:

${p.confidence||"--"}

</div>

`;

root.appendChild(
card
);

}

)

}

)

.catch(

e=>{

document
.getElementById(
"results"
)

.innerHTML=

"Error loading predictions";

console.log(e);

}

)

</script>

</body>

</html>
