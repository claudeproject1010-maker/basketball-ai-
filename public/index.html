<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basketball AI — Over/Under Predictions</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090a;--surface:#111214;--surface2:#1a1c1f;--border:#2a2d32;
  --text:#e8eaed;--muted:#7a7f8a;--green:#00e676;--amber:#ffab40;
  --red:#ff5252;--blue:#448aff;--accent:#ff6d00;--purple:#bb86fc;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
.logo{font-size:32px;line-height:1}
.brand h1{font-size:20px;font-weight:700;letter-spacing:-.4px}
.brand p{font-size:11px;color:var(--muted);margin-top:2px}
.header-right{margin-left:auto;text-align:right}
#last-updated{font-size:11px;color:var(--muted)}
#game-count{font-size:12px;color:var(--blue);font-weight:600;margin-top:2px}

#warn-banner{display:none;background:#1a1200;border-bottom:1px solid #5a3800;color:#ffab40;padding:10px 28px;font-size:12px}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 28px}
.tab{padding:12px 18px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Toolbar */
.toolbar{padding:12px 28px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface)}
.fbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 13px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .15s}
.fbtn:hover,.fbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Stats row */
.stats-bar{display:flex;border-bottom:1px solid var(--border)}
.stat{flex:1;padding:14px 16px;border-right:1px solid var(--border);text-align:center}
.stat:last-child{border-right:none}
.stat-val{font-size:24px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}

/* Accuracy panel */
.accuracy-panel{padding:24px 28px}
.acc-header{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.acc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.acc-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;text-align:center}
.acc-val{font-size:28px;font-weight:700}
.acc-lbl{font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.4px}

/* Confidence accuracy bars */
.conf-acc{margin-bottom:20px}
.conf-acc-title{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.conf-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.conf-label{width:60px;font-size:12px;font-weight:700}
.conf-bar-wrap{flex:1;background:var(--surface2);border-radius:4px;height:10px;overflow:hidden}
.conf-bar{height:100%;border-radius:4px;transition:width .5s}
.conf-stat{font-size:12px;color:var(--muted);width:80px;text-align:right}

/* Results table */
.results-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px}
.results-table{width:100%;border-collapse:collapse;font-size:12px}
.results-table th{text-align:left;padding:8px 10px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.4px}
.results-table td{padding:8px 10px;border-bottom:1px solid var(--border)}
.results-table tr:last-child td{border-bottom:none}
.hit-yes{color:var(--green);font-weight:700}
.hit-no{color:var(--red);font-weight:700}
.hit-push{color:var(--muted);font-weight:700}

/* Predictions grid */
main{padding:20px 28px}
#predictions{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .15s}
.card:hover{border-color:#444}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:11px 15px 8px;border-bottom:1px solid var(--border)}
.league-badge{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.conf-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;text-transform:uppercase}
.conf-HIGH  {background:rgba(0,230,118,.15);color:var(--green);border:1px solid rgba(0,230,118,.3)}
.conf-MEDIUM{background:rgba(255,171,64,.12);color:var(--amber);border:1px solid rgba(255,171,64,.3)}
.conf-LOW   {background:rgba(255,82,82,.12);color:var(--red);border:1px solid rgba(255,82,82,.3)}

.card-body{padding:13px 15px}
.matchup{margin-bottom:8px}
.team-name{font-size:14px;font-weight:700;line-height:1.3}
.vs{font-size:10px;color:var(--muted);margin:2px 0}
.game-time{font-size:11px;color:var(--blue);margin-bottom:10px}

.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:11px}
.metric{background:var(--surface2);border-radius:6px;padding:8px;text-align:center}
.metric-val{font-size:17px;font-weight:700}
.metric-lbl{font-size:9px;color:var(--muted);margin-top:1px;text-transform:uppercase;letter-spacing:.3px}

.prob-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.prob-label{font-size:11px;color:var(--muted);width:38px;flex-shrink:0}
.bar-wrap{flex:1;background:var(--surface2);border-radius:3px;height:6px;overflow:hidden}
.bar{height:100%;border-radius:3px;transition:width .4s}
.over-bar{background:var(--green)}.under-bar{background:var(--red)}
.prob-pct{font-size:11px;font-weight:700;width:32px;text-align:right}

.data-row{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);padding-top:8px;border-top:1px solid var(--border)}
.dg{color:var(--green)}.dw{color:var(--amber)}.dn{color:var(--red)}
.no-data-note{font-size:10px;color:var(--amber);background:rgba(255,171,64,.08);border-radius:4px;padding:4px 8px;margin-top:7px;text-align:center}

/* Diag */
#diag{display:none;margin:0 28px 16px;background:#0d1117;border:1px solid var(--border);border-radius:8px;padding:14px;font-family:monospace;font-size:11px;color:#8b949e;white-space:pre-wrap;max-height:180px;overflow-y:auto}

.state-msg{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);font-size:16px}
.state-msg .e{font-size:40px;display:block;margin-bottom:12px}
.panel-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px}

.page{display:none}.page.active{display:block}

@media(max-width:620px){
  header{padding:12px 16px}.tabs,.toolbar{padding:10px 16px}
  main,.accuracy-panel{padding:12px 16px}.stats-bar{display:none}
  #predictions{grid-template-columns:1fr}.acc-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<header>
  <div class="logo">🏀</div>
  <div class="brand">
    <h1>Basketball AI</h1>
    <p>Statistical Over/Under Predictions · WAT (GMT+1)</p>
  </div>
  <div class="header-right">
    <div id="last-updated">Loading…</div>
    <div id="game-count"></div>
  </div>
</header>

<div id="warn-banner"></div>

<div class="tabs">
  <div class="tab active" data-page="predictions">📅 Predictions</div>
  <div class="tab" data-page="accuracy">🎯 Track Record</div>
</div>

<!-- ── PREDICTIONS PAGE ── -->
<div class="page active" id="page-predictions">
  <div class="toolbar" id="toolbar">
    <button class="fbtn active" data-f="ALL">All Games</button>
    <button class="fbtn" data-f="HIGH">🔥 High</button>
    <button class="fbtn" data-f="MEDIUM">⚡ Medium</button>
    <button class="fbtn" data-f="LOW">📊 Low</button>
    <button class="fbtn" data-f="DIAG" style="margin-left:auto;color:var(--muted)">🔍 Diag</button>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">Games</div></div>
    <div class="stat"><div class="stat-val" id="s-high">—</div><div class="stat-lbl">High Conf</div></div>
    <div class="stat"><div class="stat-val" id="s-med">—</div><div class="stat-lbl">Medium</div></div>
    <div class="stat"><div class="stat-val" id="s-nohist">—</div><div class="stat-lbl">No History ⚠️</div></div>
  </div>
  <div id="diag"></div>
  <main><div id="predictions"><div class="state-msg"><span class="e">⏳</span>Loading…</div></div></main>
</div>

<!-- ── ACCURACY PAGE ── -->
<div class="page" id="page-accuracy">
  <div class="accuracy-panel" id="accuracy-content">
    <div class="panel-state"><span style="font-size:36px;display:block;margin-bottom:12px">⏳</span>Loading track record…</div>
  </div>
</div>

<script>
// ── WAT conversion ────────────────────────────────────────────────────────
function toWAT(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    if (isNaN(d)) return '';
    const w = new Date(d.getTime() + 3600000);
    const hh = String(w.getUTCHours()).padStart(2,'0');
    const mm = String(w.getUTCMinutes()).padStart(2,'0');
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${days[w.getUTCDay()]} ${w.getUTCDate()} ${months[w.getUTCMonth()]} · ${hh}:${mm} WAT`;
  } catch(e){ return ''; }
}

// ── Tab navigation ────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('page-' + tab.dataset.page).classList.add('active');
  });
});

// ── State ─────────────────────────────────────────────────────────────────
let all = [], activeF = 'ALL';

// ── Load predictions ──────────────────────────────────────────────────────
async function loadPredictions() {
  const container = document.getElementById('predictions');
  try {
    const res = await fetch('/data/predictions.json?ts=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    all = data.top_predictions || [];

    const ts = data.generated_at ? new Date(data.generated_at) : null;
    document.getElementById('last-updated').textContent = ts ? 'Updated ' + toWAT(ts.toISOString()) : '';
    document.getElementById('game-count').textContent = (data.total_games_analysed||all.length) + ' games analysed';

    const bc = data.by_confidence || {};
    const noHist = data.games_with_no_history || 0;
    document.getElementById('s-total').textContent  = all.length;
    document.getElementById('s-high').textContent   = bc.HIGH  || 0;
    document.getElementById('s-med').textContent    = bc.MEDIUM|| 0;
    document.getElementById('s-nohist').textContent = noHist;

    if (noHist === data.total_games_analysed && noHist > 0) {
      const b = document.getElementById('warn-banner');
      b.style.display='block';
      b.textContent='⚠️  No team history collected — predictions using league baselines only. Check Diagnostics.';
    }

    // Diag
    const diag = document.getElementById('diag');
    const lines = [
      `Generated: ${data.generated_at}`,
      `Total: ${data.total_games_analysed} | Skipped final: ${data.games_skipped_final||0} | No history: ${noHist}`,
      `Confidence — HIGH:${bc.HIGH||0}  MEDIUM:${bc.MEDIUM||0}  LOW:${bc.LOW||0}`,
    ];
    if (data.source_errors?.length) {
      lines.push('\nAPI ERRORS:');
      data.source_errors.forEach(e => lines.push('  ! '+e));
    }
    diag.textContent = lines.join('\n');

    // League filter buttons
    const leagues = [...new Set(all.map(p=>p.league).filter(Boolean))].sort();
    const toolbar = document.getElementById('toolbar');
    const diagBtn = toolbar.querySelector('[data-f="DIAG"]');
    leagues.forEach(lg => {
      const btn = document.createElement('button');
      btn.className='fbtn'; btn.dataset.f='LEAGUE:'+lg; btn.textContent=lg;
      toolbar.insertBefore(btn, diagBtn);
    });

    render();

    document.querySelectorAll('.fbtn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.f === 'DIAG') {
          const d=document.getElementById('diag');
          d.style.display=d.style.display==='block'?'none':'block';
          return;
        }
        document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        activeF=btn.dataset.f; render();
      });
    });
  } catch(err) {
    container.innerHTML=`<div class="state-msg"><span class="e">⚠️</span>Error loading predictions.<br><small>${err.message}</small></div>`;
  }
}

function render() {
  const container = document.getElementById('predictions');
  let f = all;
  if (activeF==='HIGH') f=all.filter(p=>p.confidence==='HIGH');
  else if (activeF==='MEDIUM') f=all.filter(p=>p.confidence==='MEDIUM');
  else if (activeF==='LOW') f=all.filter(p=>p.confidence==='LOW');
  else if (activeF.startsWith('LEAGUE:')) {
    const lg=activeF.replace('LEAGUE:',''); f=all.filter(p=>p.league===lg);
  }
  if (!f.length) { container.innerHTML=`<div class="state-msg"><span class="e">🔍</span>No games match this filter.</div>`; return; }
  container.innerHTML=f.map(card).join('');
}

function dq(n){
  if(n>=8) return `<span class="dg">${n}g ✓</span>`;
  if(n>=4) return `<span class="dw">${n}g</span>`;
  return `<span class="dn">${n||'no'}g ⚠️</span>`;
}

function card(p) {
  const op=Math.round((p.over_probability||0)*100);
  const up=Math.round((p.under_probability||0)*100);
  const hn=p.home_games_used||0, an=p.away_games_used||0;
  const noData=hn===0&&an===0;
  const wt=toWAT(p.time_utc);
  const ec=p.edge>=0?'var(--green)':'var(--red)';
  const es=p.edge>=0?'+':'';
  return `
<div class="card">
  <div class="card-header">
    <span class="league-badge">${p.league||'—'}</span>
    <span class="conf-badge conf-${p.confidence}">${p.confidence}</span>
  </div>
  <div class="card-body">
    <div class="matchup">
      <div class="team-name">${p.home_team||'—'}</div>
      <div class="vs">vs</div>
      <div class="team-name">${p.away_team||'—'}</div>
    </div>
    ${wt?`<div class="game-time">🕐 ${wt}</div>`:''}
    <div class="metrics">
      <div class="metric"><div class="metric-val" style="color:var(--blue)">${p.predicted_total!=null?Math.round(p.predicted_total):'—'}</div><div class="metric-lbl">Predicted</div></div>
      <div class="metric"><div class="metric-val" style="color:var(--muted)">${p.league_baseline||'—'}</div><div class="metric-lbl">Lg Avg</div></div>
      <div class="metric"><div class="metric-val" style="color:${ec}">${es}${p.edge??'—'}</div><div class="metric-lbl">Edge</div></div>
    </div>
    <div class="prob-row">
      <span class="prob-label">OVER</span>
      <div class="bar-wrap"><div class="bar over-bar" style="width:${op}%"></div></div>
      <span class="prob-pct" style="color:var(--green)">${op}%</span>
    </div>
    <div class="prob-row">
      <span class="prob-label">UNDER</span>
      <div class="bar-wrap"><div class="bar under-bar" style="width:${up}%"></div></div>
      <span class="prob-pct" style="color:var(--red)">${up}%</span>
    </div>
    <div class="data-row">
      <span>🏠 ${p.home_team?.split(' ').pop()||'Home'}: ${dq(hn)}${p.home_avg_scored!=null?', avg '+Math.round(p.home_avg_scored)+'pts':''}</span>
      <span>✈️ ${p.away_team?.split(' ').pop()||'Away'}: ${dq(an)}${p.away_avg_scored!=null?', avg '+Math.round(p.away_avg_scored)+'pts':''}</span>
    </div>
    ${noData?`<div class="no-data-note">⚠️ No historical data — using league baseline only</div>`:''}
  </div>
</div>`;
}

// ── Load accuracy ─────────────────────────────────────────────────────────
async function loadAccuracy() {
  const panel = document.getElementById('accuracy-content');
  try {
    const res = await fetch('/data/accuracy.json?ts=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const a = await res.json();

    if (!a.total_scored) {
      panel.innerHTML=`<div class="panel-state"><span style="font-size:36px;display:block;margin-bottom:12px">📊</span>No predictions scored yet.<br><small style="font-size:13px;color:var(--muted);margin-top:8px;display:block">Predictions will be automatically scored the day after games are played.</small></div>`;
      return;
    }

    const rateColor = r => r>=60?'var(--green)':r>=50?'var(--amber)':'var(--red)';

    // Confidence rows
    const confRows = ['HIGH','MEDIUM','LOW'].map(c => {
      const d = a.by_confidence?.[c];
      if (!d) return '';
      const rc = rateColor(d.hit_rate);
      return `
      <div class="conf-row">
        <span class="conf-label conf-badge conf-${c}" style="display:inline-block;text-align:center">${c}</span>
        <div class="conf-bar-wrap"><div class="conf-bar" style="width:${d.hit_rate}%;background:${rc}"></div></div>
        <span class="conf-stat" style="color:${rc}">${d.hit_rate}% (${d.hits}/${d.total})</span>
      </div>`;
    }).join('');

    // League rows
    const lgRows = Object.entries(a.by_league||{})
      .sort((a,b)=>b[1].total-a[1].total)
      .map(([lg,d])=>{
        const rc=rateColor(d.hit_rate);
        return `<tr><td>${lg}</td><td>${d.total}</td><td style="color:${rc};font-weight:700">${d.hit_rate}%</td><td>${d.hits}</td></tr>`;
      }).join('');

    // Last 10 results
    const resultRows = (a.last_10_results||[]).map(r=>{
      const icon = r.hit===true?'✅':r.hit===false?'❌':'➖';
      const err = r.error!=null?(r.error>0?`+${r.error}`:`${r.error}`):'—';
      return `<tr>
        <td>${r.date}</td>
        <td style="max-width:160px">${r.game}</td>
        <td>${r.league}</td>
        <td><span class="conf-badge conf-${r.confidence}">${r.confidence}</span></td>
        <td>${r.predicted||'—'}</td>
        <td>${r.actual||'—'}</td>
        <td style="color:${r.error>0?'var(--green)':'var(--red)'}">${err}</td>
        <td>${r.recommended}</td>
        <td>${icon} ${r.outcome}</td>
      </tr>`;
    }).join('');

    panel.innerHTML = `
      <h2 class="acc-header">🎯 Prediction Track Record</h2>
      <div class="acc-grid">
        <div class="acc-card">
          <div class="acc-val" style="color:${rateColor(a.overall_hit_rate)}">${a.overall_hit_rate}%</div>
          <div class="acc-lbl">Overall Hit Rate</div>
        </div>
        <div class="acc-card">
          <div class="acc-val" style="color:var(--blue)">${a.total_scored}</div>
          <div class="acc-lbl">Total Scored</div>
        </div>
        <div class="acc-card">
          <div class="acc-val" style="color:${rateColor(a.recent_20_hit_rate)}">${a.recent_20_hit_rate}%</div>
          <div class="acc-lbl">Last 20 Games</div>
        </div>
        <div class="acc-card">
          <div class="acc-val" style="color:var(--amber)">±${a.avg_abs_error}</div>
          <div class="acc-lbl">Avg Points Error</div>
        </div>
      </div>

      <div class="conf-acc">
        <div class="conf-acc-title">Hit Rate by Confidence Tier</div>
        ${confRows}
      </div>

      ${lgRows ? `
      <div style="margin-bottom:24px">
        <div class="results-title">By League</div>
        <table class="results-table">
          <thead><tr><th>League</th><th>Games</th><th>Hit Rate</th><th>Hits</th></tr></thead>
          <tbody>${lgRows}</tbody>
        </table>
      </div>` : ''}

      ${resultRows ? `
      <div>
        <div class="results-title">Last 10 Scored Results</div>
        <div style="overflow-x:auto">
        <table class="results-table">
          <thead><tr><th>Date</th><th>Game</th><th>League</th><th>Conf</th><th>Pred</th><th>Actual</th><th>Error</th><th>Tip</th><th>Result</th></tr></thead>
          <tbody>${resultRows}</tbody>
        </table>
        </div>
      </div>` : ''}
    `;
  } catch(err) {
    panel.innerHTML=`<div class="panel-state"><span style="font-size:36px;display:block;margin-bottom:12px">📊</span>Track record not available yet.<br><small style="font-size:13px;color:var(--muted);margin-top:8px;display:block">Will appear after the first games are scored automatically.</small></div>`;
  }
}

loadPredictions();
loadAccuracy();
</script>
</body>
</html>
