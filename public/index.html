<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>
Basketball AI
</title>

<style>

body{

font-family:
Arial;

max-width:
1400px;

margin:
auto;

padding:
20px;

background:
#111;

color:
white;

}

h1{

margin-bottom:
10px;

}

.card{

background:
#1c1c1c;

padding:
16px;

margin-bottom:
12px;

border-radius:
10px;

}

.high{

color:
#00ff99;

}

.medium{

color:
orange;

}

.low{

color:
red;

}

.small{

opacity:
0.7;

}

</style>

</head>

<body>

<h1>
🏀 Basketball AI
</h1>

<div
class="small">

Top 30 OVER predictions

</div>

<br>

<div
id="results">

Loading…

</div>

<script>

fetch(
"./data/predictions.json"
)

.then(
r=>r.json()
)

.then(

data=>{

const predictions=

data.top_predictions
||

data.predictions

||

[];

const root=

document
.getElementById(
"results"
);

root.innerHTML="";

predictions.forEach(

p=>{

const div=

document
.createElement(
"div"
);

let cls="low";

if(
p.confidence
==="HIGH"
)

cls="high";

else if(
p.confidence
==="MEDIUM"
)

cls="medium";

div.className=
"card";

div.innerHTML=

`

<h2>

${p.game}

</h2>

<div>

League:
${p.league}

</div>

<div>

Expected:
${p.predicted_total}

</div>

<div>

Market:
${p.market_total}

</div>

<div>

Edge:
${p.edge}

</div>

<div>

Probability:

${(
p.over_probability
*
100
).toFixed(0)}%

</div>

<div
class="${cls}">

Confidence:

${p.confidence}

</div>

`;

root
.appendChild(
div
);

}

)

}

)

.catch(

()=>{

document
.getElementById(
"results"
)

.innerHTML=

"Could not load predictions";

}

)

</script>

</body>

</html>
