```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Basketball AI</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
padding:40px;
}

.header{
display:flex;
align-items:center;
gap:20px;
margin-bottom:30px;
}

.logo{
font-size:70px;
}

h1{
font-size:80px;
font-weight:700;
}

.subtitle{
font-size:18px;
color:#aaa;
margin-bottom:40px;
}

#predictions{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(350px,1fr));
gap:24px;
}

.card{
background:#0c0c0c;
padding:30px;
border-radius:20px;
}

.card h2{
font-size:40px;
margin-bottom:20px;
}

.card p{
font-size:26px;
margin:10px 0;
}

.high{
color:#00ff55;
font-weight:bold;
}

.medium{
color:#ffaa00;
font-weight:bold;
}

.low{
color:#ff5555;
font-weight:bold;
}

.message{
font-size:32px;
color:#ff6666;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
🏀
</div>

<h1>
Basketball AI
</h1>

</div>

<div class="subtitle">
Top 30 OVER predictions
</div>

<div id="predictions">

<div class="message">
Loading predictions...
</div>

</div>

<script>

async function loadPredictions(){

const container =
document.getElementById(
"predictions"
);

try{

const response =
await fetch(
"/data/predictions.json?ts="
+ Date.now()
);

if(!response.ok){

throw new Error(
"JSON not found"
);

}

const data =
await response.json();

const predictions =
data.top_predictions ||
data.predictions ||
[];

container.innerHTML = "";

if(
!Array.isArray(
predictions
)
||
predictions.length===0
){

container.innerHTML =
`
<div class="message">
No predictions found
</div>
`;

return;

}

predictions.forEach(
(p)=>{

const prob =
Math.round(
(
p.over_probability
||
0
)
*
100
);

const confidence =
(
p.confidence
||
"UNKNOWN"
)
.toLowerCase();

container.innerHTML
+=
`
<div class="card">

<h2>
${p.game}
</h2>

<p>
League:
${p.league}
</p>

<p>
Expected:
${p.predicted_total}
</p>

<p>
Market:
${p.market_total}
</p>

<p>
Edge:
${p.edge}
</p>

<p>
Probability:
${prob}%
</p>

<p>

Confidence:

<span
class=
"${confidence}"
>

${p.confidence}

</span>

</p>

</div>
`;

}
);

}

catch(err){

container.innerHTML =
`
<div class="message">

Error loading predictions

</div>
`;

console.log(err);

}

}

loadPredictions();

</script>

</body>
</html>
```
