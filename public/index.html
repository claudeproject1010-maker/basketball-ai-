<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basketball AI — Over/Under Predictions</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #08090a;
    --surface: #111214;
    --surface2: #1a1c1f;
    --border: #2a2d32;
    --text: #e8eaed;
    --muted: #7a7f8a;
    --green: #00e676;
    --amber: #ffab40;
    --red: #ff5252;
    --blue: #448aff;
    --accent: #ff6d00;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo { font-size: 36px; line-height: 1; }
  .brand h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .brand p  { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header-right { margin-left: auto; text-align: right; }
  #last-updated { font-size: 12px; color: var(--muted); }
  #game-count   { font-size: 13px; color: var(--blue); font-weight: 600; margin-top: 2px; }

  /* ── Filters ── */
  .toolbar {
    padding: 16px 32px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .stat {
    flex: 1;
    padding: 16px 24px;
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .stat:last-child { border-right: none; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--text); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }

  /* ── Grid ── */
  main { padding: 24px 32px; }
  #predictions {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color .15s;
  }
  .card:hover { border-color: #444; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
  }
  .league-badge {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .conf-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: .3px;
  }
  .conf-HIGH   { background: rgba(0,230,118,.15); color: var(--green); border: 1px solid rgba(0,230,118,.3); }
  .conf-MEDIUM { background: rgba(255,171,64,.12); color: var(--amber); border: 1px solid rgba(255,171,64,.3); }
  .conf-LOW    { background: rgba(255,82,82,.12);  color: var(--red);   border: 1px solid rgba(255,82,82,.3);  }

  .card-body { padding: 16px 18px; }

  .matchup { font-size: 17px; font-weight: 700; line-height: 1.3; margin-bottom: 14px; }
  .team-a  { color: var(--text); }
  .vs      { color: var(--muted); font-size: 13px; font-weight: 400; margin: 2px 0; }
  .team-b  { color: var(--text); }

  .metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .metric {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .metric-val  { font-size: 20px; font-weight: 700; }
  .metric-lbl  { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .3px; }

  /* Probability bar */
  .prob-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .prob-label { font-size: 12px; color: var(--muted); width: 36px; flex-shrink: 0; }
  .prob-bar-wrap { flex: 1; background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden; }
  .prob-bar { height: 100%; border-radius: 4px; transition: width .4s; }
  .over-bar  { background: var(--green); }
  .under-bar { background: var(--red); }
  .prob-pct  { font-size: 12px; font-weight: 700; width: 38px; text-align: right; }

  /* Data quality */
  .data-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .data-good { color: var(--green); }
  .data-warn { color: var(--amber); }
  .data-none { color: var(--red); }

  /* ── Empty / loading states ── */
  .state-msg {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-size: 18px;
  }
  .state-msg .emoji { font-size: 48px; display: block; margin-bottom: 16px; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { padding: 16px; }
    .toolbar { padding: 12px 16px; }
    main { padding: 16px; }
    .stats-bar { display: none; }
    #predictions { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: repeat(3,1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🏀</div>
  <div class="brand">
    <h1>Basketball AI</h1>
    <p>Statistical Over/Under Predictions</p>
  </div>
  <div class="header-right">
    <div id="last-updated">Loading…</div>
    <div id="game-count"></div>
  </div>
</header>

<div class="toolbar" id="toolbar">
  <button class="filter-btn active" data-filter="ALL">All Games</button>
  <button class="filter-btn" data-filter="HIGH">🔥 High Confidence</button>
  <button class="filter-btn" data-filter="MEDIUM">⚡ Medium</button>
  <button class="filter-btn" data-filter="LOW">📊 Low</button>
  <!-- League filters added dynamically -->
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stat"><div class="stat-value" id="stat-total">—</div><div class="stat-label">Games Today</div></div>
  <div class="stat"><div class="stat-value" id="stat-high">—</div><div class="stat-label">High Confidence</div></div>
  <div class="stat"><div class="stat-value" id="stat-med">—</div><div class="stat-label">Medium</div></div>
  <div class="stat"><div class="stat-value" id="stat-avg-prob">—</div><div class="stat-label">Avg Over Prob</div></div>
</div>

<main>
  <div id="predictions">
    <div class="state-msg"><span class="emoji">⏳</span>Loading predictions…</div>
  </div>
</main>

<script>
let allPredictions = [];
let activeFilter = 'ALL';

async function load() {
  const container = document.getElementById('predictions');
  try {
    const res = await fetch('/data/predictions.json?ts=' + Date.now());
    if (!res.ok) throw new Error('not found');
    const data = await res.json();

    allPredictions = data.top_predictions || data.predictions || [];

    // Metadata
    const ts = data.generated_at ? new Date(data.generated_at) : null;
    document.getElementById('last-updated').textContent =
      ts ? 'Updated ' + ts.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) + ' UTC' : '';
    document.getElementById('game-count').textContent =
      `${data.total_games_analysed || allPredictions.length} games analysed`;

    // Stats bar
    const high   = allPredictions.filter(p => p.confidence === 'HIGH').length;
    const med    = allPredictions.filter(p => p.confidence === 'MEDIUM').length;
    const avgProb = allPredictions.length
      ? (allPredictions.reduce((s,p) => s + (p.over_probability||0), 0) / allPredictions.length * 100).toFixed(0) + '%'
      : '—';
    document.getElementById('stat-total').textContent  = allPredictions.length;
    document.getElementById('stat-high').textContent   = high;
    document.getElementById('stat-med').textContent    = med;
    document.getElementById('stat-avg-prob').textContent = avgProb;

    // Dynamic league filters
    const leagues = [...new Set(allPredictions.map(p => p.league).filter(Boolean))].sort();
    const toolbar = document.getElementById('toolbar');
    leagues.forEach(lg => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.filter = 'LEAGUE:' + lg;
      btn.textContent = lg;
      toolbar.appendChild(btn);
    });

    renderCards();

    // Filter button handlers
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderCards();
      });
    });

  } catch (err) {
    container.innerHTML = `<div class="state-msg"><span class="emoji">⚠️</span>Predictions not available yet.<br><small style="font-size:14px;margin-top:8px;display:block">Run the GitHub Action to generate them.</small></div>`;
    console.error(err);
  }
}

function renderCards() {
  const container = document.getElementById('predictions');
  let filtered = allPredictions;

  if (activeFilter === 'HIGH')   filtered = filtered.filter(p => p.confidence === 'HIGH');
  else if (activeFilter === 'MEDIUM') filtered = filtered.filter(p => p.confidence === 'MEDIUM');
  else if (activeFilter === 'LOW')    filtered = filtered.filter(p => p.confidence === 'LOW');
  else if (activeFilter.startsWith('LEAGUE:')) {
    const lg = activeFilter.replace('LEAGUE:', '');
    filtered = filtered.filter(p => p.league === lg);
  }

  if (!filtered.length) {
    container.innerHTML = `<div class="state-msg"><span class="emoji">🔍</span>No predictions match this filter.</div>`;
    return;
  }

  container.innerHTML = filtered.map(p => cardHTML(p)).join('');
}

function cardHTML(p) {
  const overPct  = Math.round((p.over_probability  || 0) * 100);
  const underPct = Math.round((p.under_probability || 0) * 100);
  const homeGames = p.home_games_used || 0;
  const awayGames = p.away_games_used || 0;

  const dataQuality = (side, n) => {
    if (n >= 8) return `<span class="data-good">${n} games</span>`;
    if (n >= 4) return `<span class="data-warn">${n} games</span>`;
    return `<span class="data-none">${n || 'no'} games</span>`;
  };

  const fmtStat = v => (v != null ? Math.round(v) : '—');
  const edgeSign = p.edge >= 0 ? '+' : '';

  return `
<div class="card">
  <div class="card-header">
    <span class="league-badge">${p.league || 'Unknown'}</span>
    <span class="conf-badge conf-${p.confidence}">${p.confidence}</span>
  </div>
  <div class="card-body">
    <div class="matchup">
      <div class="team-a">${p.home_team || p.game?.split(' vs ')[0] || '—'}</div>
      <div class="vs">vs</div>
      <div class="team-b">${p.away_team || p.game?.split(' vs ')[1] || '—'}</div>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="metric-val" style="color:var(--blue)">${p.predicted_total != null ? Math.round(p.predicted_total) : '—'}</div>
        <div class="metric-lbl">Predicted Total</div>
      </div>
      <div class="metric">
        <div class="metric-val" style="color:var(--muted)">${fmtStat(p.league_baseline)}</div>
        <div class="metric-lbl">League Avg</div>
      </div>
      <div class="metric">
        <div class="metric-val" style="color:${p.edge >= 0 ? 'var(--green)' : 'var(--red)'}">${edgeSign}${p.edge != null ? p.edge : '—'}</div>
        <div class="metric-lbl">Edge</div>
      </div>
    </div>

    <div class="prob-row">
      <span class="prob-label">OVER</span>
      <div class="prob-bar-wrap"><div class="prob-bar over-bar" style="width:${overPct}%"></div></div>
      <span class="prob-pct" style="color:var(--green)">${overPct}%</span>
    </div>
    <div class="prob-row">
      <span class="prob-label">UNDER</span>
      <div class="prob-bar-wrap"><div class="prob-bar under-bar" style="width:${underPct}%"></div></div>
      <span class="prob-pct" style="color:var(--red)">${underPct}%</span>
    </div>

    <div class="data-row">
      <span>🏠 ${p.home_team?.split(' ').pop() || 'Home'}: ${dataQuality('home', homeGames)}, avg ${fmtStat(p.home_avg_scored)} pts</span>
      <span>✈️ ${dataQuality('away', awayGames)}</span>
    </div>
  </div>
</div>`;
}

load();
</script>
</body>
</html>
